<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <title>404 — PARALLAX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="Untitled-1.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a1128;
            color: #e8ecf4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }
        .container { padding: 32px; }
        .code {
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #4a7dd7;
            line-height: 1;
            margin-bottom: 16px;
        }
        .message {
            font-size: 1.1rem;
            font-weight: 300;
            color: #8a94a8;
            margin-bottom: 32px;
        }
        a {
            display: inline-block;
            padding: 12px 28px;
            border: 1px solid rgba(74, 125, 215, 0.3);
            color: #4a7dd7;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        a:hover {
            background: rgba(74, 125, 215, 0.08);
            border-color: #4a7dd7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <p class="message">This signal was not found in the environment.</p>
        <a href="/">Return to Base</a>
    </div>
</body>
</html>
